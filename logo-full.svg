<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0099CC;stop-opacity:0.9" />
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B46C1;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    
    <filter id="blurEffect">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  
  <!-- Water splash base -->
  <ellipse cx="120" cy="210" rx="90" ry="30" fill="url(#waterGrad)" opacity="0.6" filter="url(#blurEffect)"/>
  
  <!-- Water droplets -->
  <circle cx="70" cy="195" r="12" fill="url(#waterGrad)" opacity="0.7">
    <animate attributeName="cy" values="195;180;195" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="200" r="10" fill="url(#waterGrad)" opacity="0.7">
    <animate attributeName="cy" values="200;185;200" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Main coin -->
  <circle cx="120" cy="120" r="65" fill="url(#coinGrad)" stroke="#CC8800" stroke-width="3"/>
  
  <!-- Coin inner circle -->
  <circle cx="120" cy="120" r="57" fill="none" stroke="#FFE55C" stroke-width="2" opacity="0.6"/>
  
  <!-- Blockchain hexagon pattern -->
  <g opacity="0.3">
    <polygon points="120,95 132,102 132,116 120,123 108,116 108,102" fill="none" stroke="#CC8800" stroke-width="1.5"/>
    <polygon points="95,110 107,117 107,131 95,138 83,131 83,117" fill="none" stroke="#CC8800" stroke-width="1.5"/>
    <polygon points="145,110 157,117 157,131 145,138 133,131 133,117" fill="none" stroke="#CC8800" stroke-width="1.5"/>
  </g>
  
  <!-- Coin highlight -->
  <ellipse cx="105" cy="105" rx="20" ry="15" fill="url(#glowGrad)" opacity="0.8"/>
  
  <!-- Dollar sign -->
  <text x="120" y="140" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="#CC8800" text-anchor="middle">$</text>
  
  <!-- Motion lines -->
  <line x1="120" y1="55" x2="120" y2="40" stroke="#FFD700" stroke-width="2.5" opacity="0.6" stroke-linecap="round">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/>
  </line>
  
  <!-- CoinDrop Text -->
  <text x="280" y="140" font-family="'Arial Black', sans-serif" font-size="80" font-weight="900" fill="url(#textGrad)" letter-spacing="2">
    CoinDrop
  </text>
  
  <!-- Subtitle -->
  <text x="280" y="180" font-family="Arial, sans-serif" font-size="24" fill="#00D4FF" opacity="0.8" letter-spacing="4">
    WEB3 PHYSICS GAME
  </text>
  
  <!-- Decorative elements -->
  <circle cx="750" cy="80" r="4" fill="#00D4FF" opacity="0.6">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="770" cy="100" r="3" fill="#6B46C1" opacity="0.6">
    <animate attributeName="r" values="3;5;3" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="730" cy="110" r="3.5" fill="#FFD700" opacity="0.6">
    <animate attributeName="r" values="3.5;5.5;3.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
