<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0033;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="coinGradBanner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="waterGradBanner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0099CC;stop-opacity:0.9" />
    </linearGradient>
    
    <linearGradient id="textGradBanner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B46C1;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGradBanner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    
    <filter id="blurBanner">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.1" stroke="#00D4FF" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>
  
  <!-- Floating particles -->
  <circle cx="100" cy="80" r="3" fill="#00D4FF" opacity="0.5">
    <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="320" r="2.5" fill="#FFD700" opacity="0.5">
    <animate attributeName="cy" values="320;300;320" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="100" r="2" fill="#6B46C1" opacity="0.5">
    <animate attributeName="cy" values="100;80;100" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Water splash base -->
  <ellipse cx="250" cy="310" rx="130" ry="45" fill="url(#waterGradBanner)" opacity="0.5" filter="url(#blurBanner)"/>
  
  <!-- Water droplets -->
  <circle cx="180" cy="285" r="18" fill="url(#waterGradBanner)" opacity="0.7">
    <animate attributeName="cy" values="285;260;285" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="295" r="15" fill="url(#waterGradBanner)" opacity="0.7">
    <animate attributeName="cy" values="295;270;295" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="290" r="20" fill="url(#waterGradBanner)" opacity="0.8">
    <animate attributeName="cy" values="290;265;290" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Main coin -->
  <circle cx="250" cy="180" r="95" fill="url(#coinGradBanner)" stroke="#CC8800" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Coin inner circle -->
  <circle cx="250" cy="180" r="83" fill="none" stroke="#FFE55C" stroke-width="2.5" opacity="0.6"/>
  
  <!-- Blockchain hexagon pattern on coin -->
  <g opacity="0.3">
    <polygon points="250,145 268,155 268,175 250,185 232,175 232,155" fill="none" stroke="#CC8800" stroke-width="2"/>
    <polygon points="215,165 233,175 233,195 215,205 197,195 197,175" fill="none" stroke="#CC8800" stroke-width="2"/>
    <polygon points="285,165 303,175 303,195 285,205 267,195 267,175" fill="none" stroke="#CC8800" stroke-width="2"/>
  </g>
  
  <!-- Coin highlight -->
  <ellipse cx="225" cy="155" rx="30" ry="25" fill="url(#glowGradBanner)" opacity="0.8"/>
  
  <!-- Dollar sign on coin -->
  <text x="250" y="210" font-family="Arial, sans-serif" font-size="75" font-weight="bold" fill="#CC8800" text-anchor="middle">$</text>
  
  <!-- Motion lines (physics effect) -->
  <line x1="250" y1="85" x2="250" y2="60" stroke="#FFD700" stroke-width="4" opacity="0.6" stroke-linecap="round">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <line x1="280" y1="100" x2="300" y2="75" stroke="#FFD700" stroke-width="3" opacity="0.5" stroke-linecap="round">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.7s" repeatCount="indefinite"/>
  </line>
  <line x1="220" y1="100" x2="200" y2="75" stroke="#FFD700" stroke-width="3" opacity="0.5" stroke-linecap="round">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.6s" repeatCount="indefinite"/>
  </line>
  
  <!-- CoinDrop Text -->
  <text x="520" y="220" font-family="'Arial Black', sans-serif" font-size="120" font-weight="900" fill="url(#textGradBanner)" letter-spacing="4" filter="url(#glow)">
    CoinDrop
  </text>
  
  <!-- Subtitle -->
  <text x="520" y="270" font-family="Arial, sans-serif" font-size="32" fill="#00D4FF" opacity="0.9" letter-spacing="8">
    WEB3 PHYSICS GAME
  </text>
  
  <!-- Tagline -->
  <text x="520" y="310" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" opacity="0.6" letter-spacing="2">
    Drop coins • Master physics • Earn rewards on Monad
  </text>
  
  <!-- Web3 connection nodes -->
  <circle cx="450" cy="120" r="6" fill="#00D4FF" opacity="0.8">
    <animate attributeName="r" values="6;9;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="200" r="6" fill="#00D4FF" opacity="0.8">
    <animate attributeName="r" values="6;9;6" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <line x1="250" y1="180" x2="450" y2="120" stroke="#00D4FF" stroke-width="1.5" opacity="0.3" stroke-dasharray="5,5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </line>
</svg>
